<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Калькулятор</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0a0a0a;
  --panel:#111111;
  --panel2:#181818;
  --border:#222;
  --border2:#2a2a2a;
  --text:#e8e8e8;
  --text2:#555;
  --text3:#333;
  --accent:#c8f135;
  --accent2:#a8d020;
  --op:#1a1a1a;
  --op-text:#c8f135;
  --fn:#141414;
  --fn-text:#888;
  --num:#161616;
  --num-text:#e8e8e8;
  --eq:#c8f135;
  --eq-text:#0a0a0a;
  --red:#ff4d4d;
  --radius:12px;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

/* Фоновая сетка */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size:40px 40px;
  opacity:0.3;
  pointer-events:none;
}

.app{
  display:flex;
  gap:12px;
  align-items:flex-start;
  width:100%;
  max-width:680px;
  animation:appIn .4s cubic-bezier(.16,1,.3,1) both;
}

@keyframes appIn{
  from{opacity:0;transform:translateY(24px)}
  to{opacity:1;transform:translateY(0)}
}

/* Калькулятор */
.calc{
  flex-shrink:0;
  width:300px;
  background:var(--panel);
  border:1px solid var(--border2);
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 32px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.03);
}

/* Дисплей */
.display{
  background:var(--panel2);
  padding:20px 20px 16px;
  min-height:110px;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  align-items:flex-end;
  gap:4px;
  border-bottom:1px solid var(--border);
  position:relative;
}

.mode-badge{
  position:absolute;
  top:12px;
  left:14px;
  font-size:9px;
  font-family:'Space Mono',monospace;
  letter-spacing:.1em;
  color:var(--text2);
  text-transform:uppercase;
  cursor:pointer;
  padding:3px 8px;
  border:1px solid var(--border2);
  border-radius:20px;
  transition:all .2s;
  user-select:none;
}
.mode-badge:hover{border-color:var(--accent);color:var(--accent)}
.mode-badge.sci{border-color:var(--accent);color:var(--accent)}

.display-expr{
  font-family:'Space Mono',monospace;
  font-size:12px;
  color:var(--text2);
  min-height:16px;
  text-align:right;
  word-break:break-all;
  max-width:100%;
}

.display-main{
  font-family:'Space Mono',monospace;
  font-size:36px;
  font-weight:700;
  color:var(--text);
  text-align:right;
  word-break:break-all;
  line-height:1;
  transition:color .15s;
}

.display-main.error{color:var(--red)}

/* Кнопки */
.btns{
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:6px;
}

/* Научная панель */
.sci-panel{
  padding:12px 12px 0;
  display:none;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
}
.sci-panel.visible{display:grid}

.row{display:grid;gap:6px}
.row.r4{grid-template-columns:repeat(4,1fr)}
.row.r4-span{grid-template-columns:repeat(4,1fr)}

.btn{
  height:58px;
  border:1px solid var(--border);
  border-radius:var(--radius);
  background:var(--num);
  color:var(--num-text);
  font-family:'Space Mono',monospace;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
  transition:background .12s, transform .08s, border-color .12s, box-shadow .12s;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}

.btn::after{
  content:'';
  position:absolute;
  inset:0;
  background:rgba(255,255,255,0);
  transition:background .1s;
}
.btn:hover::after{background:rgba(255,255,255,.04)}
.btn:active{transform:scale(.91);transition:transform .05s}

.btn.fn{
  background:var(--fn);
  color:var(--fn-text);
  font-size:12px;
  font-weight:400;
  font-family:'DM Sans',sans-serif;
  border-color:var(--border);
}
.btn.fn:hover{border-color:#333}

.btn.op{
  background:var(--op);
  color:var(--op-text);
  font-size:20px;
  border-color:#222;
}
.btn.op:hover{border-color:var(--accent);box-shadow:0 0 12px rgba(200,241,53,.1)}
.btn.op.active-op{
  background:rgba(200,241,53,.12);
  border-color:var(--accent);
  box-shadow:0 0 16px rgba(200,241,53,.15);
}

.btn.eq{
  background:var(--eq);
  color:var(--eq-text);
  font-size:22px;
  border-color:var(--accent);
}
.btn.eq:hover{background:var(--accent2);box-shadow:0 4px 20px rgba(200,241,53,.3)}
.btn.eq:active{transform:scale(.88)}

.btn.zero{grid-column:span 2; justify-content:flex-start; padding-left:22px;}

.btn.sci-fn{
  background:var(--fn);
  color:#666;
  font-size:11px;
  font-family:'Space Mono',monospace;
  font-weight:400;
  height:44px;
  border-color:var(--border);
}
.btn.sci-fn:hover{color:var(--accent);border-color:#333}

/* Ripple */
.ripple{
  position:absolute;
  border-radius:50%;
  background:rgba(200,241,53,.15);
  transform:scale(0);
  animation:ripple .45s linear;
  pointer-events:none;
}
@keyframes ripple{to{transform:scale(5);opacity:0}}

/* Анимации дисплея */
@keyframes numIn{
  0%{transform:translateY(5px);opacity:.6}
  100%{transform:translateY(0);opacity:1}
}
@keyframes resultIn{
  0%{transform:scale(.92);opacity:0}
  100%{transform:scale(1);opacity:1}
}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-6px)}
  40%{transform:translateX(6px)}
  60%{transform:translateX(-4px)}
  80%{transform:translateX(4px)}
}
.anim-num{animation:numIn .12s ease both}
.anim-result{animation:resultIn .2s cubic-bezier(.34,1.56,.64,1) both}
.anim-shake{animation:shake .3s ease}

/* История */
.history{
  flex:1;
  min-width:0;
  background:var(--panel);
  border:1px solid var(--border2);
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 32px 80px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.03);
  display:flex;
  flex-direction:column;
  max-height:520px;
}

.history-header{
  padding:14px 16px 12px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-shrink:0;
}

.history-title{
  font-size:11px;
  font-family:'Space Mono',monospace;
  letter-spacing:.1em;
  color:var(--text2);
  text-transform:uppercase;
}

.history-clear{
  font-size:11px;
  color:var(--text3);
  cursor:pointer;
  background:none;
  border:none;
  font-family:'DM Sans',sans-serif;
  transition:color .2s;
  padding:2px 6px;
  border-radius:6px;
}
.history-clear:hover{color:var(--red)}

.history-list{
  flex:1;
  overflow-y:auto;
  padding:8px;
  display:flex;
  flex-direction:column-reverse;
  gap:4px;
}
.history-list::-webkit-scrollbar{width:3px}
.history-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

.history-empty{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  color:var(--text3);
  font-family:'Space Mono',monospace;
  padding:20px;
  text-align:center;
  line-height:1.8;
}

.history-item{
  background:var(--panel2);
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px 12px;
  cursor:pointer;
  transition:border-color .15s, background .15s;
  animation:histIn .2s ease both;
}
.history-item:hover{border-color:var(--border2);background:#1c1c1c}

@keyframes histIn{
  from{opacity:0;transform:translateX(8px)}
  to{opacity:1;transform:translateX(0)}
}

.hist-expr{
  font-size:11px;
  color:var(--text2);
  font-family:'Space Mono',monospace;
  margin-bottom:3px;
  word-break:break-all;
}
.hist-result{
  font-size:16px;
  font-family:'Space Mono',monospace;
  font-weight:700;
  color:var(--accent);
  word-break:break-all;
}

/* Адаптив */
@media(max-width:560px){
  .app{flex-direction:column;align-items:stretch}
  .calc{width:100%}
  .history{max-height:200px}
}
</style>
</head>
<body>

<div class="app">
  <div class="calc">
    <div class="display">
      <div class="mode-badge" id="modeBadge" onclick="toggleSci()">BASIC</div>
      <div class="display-expr" id="expr"></div>
      <div class="display-main" id="main">0</div>
    </div>

    <!-- Научная панель -->
    <div class="sci-panel" id="sciPanel">
      <button class="btn sci-fn" onclick="sciAction('sin')">sin</button>
      <button class="btn sci-fn" onclick="sciAction('cos')">cos</button>
      <button class="btn sci-fn" onclick="sciAction('tan')">tan</button>
      <button class="btn sci-fn" onclick="sciAction('sqrt')">√x</button>
      <button class="btn sci-fn" onclick="sciAction('pow2')">x²</button>
      <button class="btn sci-fn" onclick="sciAction('pow3')">x³</button>
      <button class="btn sci-fn" onclick="sciAction('inv')">1/x</button>
      <button class="btn sci-fn" onclick="sciAction('log')">log</button>
      <button class="btn sci-fn" onclick="sciAction('ln')">ln</button>
      <button class="btn sci-fn" onclick="sciAction('pi')">π</button>
      <button class="btn sci-fn" onclick="sciAction('e')">e</button>
      <button class="btn sci-fn" onclick="sciAction('fact')">n!</button>
    </div>

    <div class="btns">
      <div class="row r4">
        <button class="btn fn" data-action="clear">AC</button>
        <button class="btn fn" data-action="sign">+/−</button>
        <button class="btn fn" data-action="percent">%</button>
        <button class="btn op" data-action="op" data-val="÷">÷</button>
      </div>
      <div class="row r4">
        <button class="btn" data-action="digit" data-val="7">7</button>
        <button class="btn" data-action="digit" data-val="8">8</button>
        <button class="btn" data-action="digit" data-val="9">9</button>
        <button class="btn op" data-action="op" data-val="×">×</button>
      </div>
      <div class="row r4">
        <button class="btn" data-action="digit" data-val="4">4</button>
        <button class="btn" data-action="digit" data-val="5">5</button>
        <button class="btn" data-action="digit" data-val="6">6</button>
        <button class="btn op" data-action="op" data-val="−">−</button>
      </div>
      <div class="row r4">
        <button class="btn" data-action="digit" data-val="1">1</button>
        <button class="btn" data-action="digit" data-val="2">2</button>
        <button class="btn" data-action="digit" data-val="3">3</button>
        <button class="btn op" data-action="op" data-val="+">+</button>
      </div>
      <div class="row r4-span">
        <button class="btn zero" data-action="digit" data-val="0">0</button>
        <button class="btn" data-action="dot">.</button>
        <button class="btn eq" data-action="eq">=</button>
      </div>
    </div>
  </div>

  <!-- История -->
  <div class="history">
    <div class="history-header">
      <span class="history-title">История</span>
      <button class="history-clear" onclick="clearHistory()">Очистить</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="history-empty" id="historyEmpty">Здесь появятся<br>твои вычисления</div>
    </div>
  </div>
</div>

<script>
let current='0', prev='', operator='', justEvaled=false, sciMode=false;
let history=[];

const mainEl=document.getElementById('main');
const exprEl=document.getElementById('expr');
const histList=document.getElementById('historyList');
const histEmpty=document.getElementById('historyEmpty');
const modeBadge=document.getElementById('modeBadge');
const sciPanel=document.getElementById('sciPanel');

function animate(cls){
  mainEl.classList.remove('anim-num','anim-result','anim-shake');
  void mainEl.offsetWidth;
  mainEl.classList.add(cls);
}

function updateDisplay(anim){
  let txt=current;
  mainEl.classList.remove('error');
  if(txt==='Ошибка'){mainEl.classList.add('error');}
  else if(txt.length>12){txt=parseFloat(parseFloat(txt).toPrecision(10)).toString();}
  mainEl.textContent=txt;
  if(anim)animate(anim);
}

function highlightOp(val){
  document.querySelectorAll('.btn.op').forEach(b=>b.classList.remove('active-op'));
  if(val) document.querySelectorAll('.btn.op').forEach(b=>{if(b.dataset.val===val)b.classList.add('active-op');});
}

function applyOp(a,b,op){
  a=parseFloat(a); b=parseFloat(b);
  if(op==='+') return a+b;
  if(op==='−') return a-b;
  if(op==='×') return a*b;
  if(op==='÷') return b===0?'Ошибка':a/b;
}

function fmt(n){
  if(typeof n==='string') return n;
  const r=parseFloat(n.toPrecision(12));
  if(Math.abs(r)>=1e15||Math.abs(r)<1e-10&&r!==0) return r.toExponential(4);
  return r.toString();
}

function ripple(btn,e){
  const r=btn.getBoundingClientRect();
  const size=Math.max(r.width,r.height);
  const el=document.createElement('span');
  el.className='ripple';
  el.style.cssText=`width:${size}px;height:${size}px;left:${e.clientX-r.left-size/2}px;top:${e.clientY-r.top-size/2}px`;
  btn.appendChild(el);
  el.addEventListener('animationend',()=>el.remove());
}

function addHistory(expr,result){
  history.unshift({expr,result});
  if(history.length>50) history.pop();
  renderHistory();
}

function renderHistory(){
  histEmpty && (histEmpty.style.display=history.length?'none':'flex');
  // Удаляем старые итемы
  document.querySelectorAll('.history-item').forEach(el=>el.remove());
  history.forEach(h=>{
    const div=document.createElement('div');
    div.className='history-item';
    div.innerHTML=`<div class="hist-expr">${h.expr}</div><div class="hist-result">= ${h.result}</div>`;
    div.onclick=()=>{current=h.result;justEvaled=true;operator='';prev='';highlightOp(null);exprEl.textContent=h.expr;updateDisplay('anim-result');};
    histList.appendChild(div);
  });
}

function clearHistory(){
  history=[];
  document.querySelectorAll('.history-item').forEach(el=>el.remove());
  if(histEmpty) histEmpty.style.display='flex';
}

function toggleSci(){
  sciMode=!sciMode;
  sciPanel.classList.toggle('visible',sciMode);
  modeBadge.classList.toggle('sci',sciMode);
  modeBadge.textContent=sciMode?'SCI':'BASIC';
}

function sciAction(fn){
  const n=parseFloat(current);
  if(isNaN(n)){animate('anim-shake');return;}
  let result, label;
  const deg2rad=Math.PI/180;
  switch(fn){
    case 'sin': result=Math.sin(n*deg2rad); label=`sin(${n}°)`; break;
    case 'cos': result=Math.cos(n*deg2rad); label=`cos(${n}°)`; break;
    case 'tan': result=n%180===90?'Ошибка':Math.tan(n*deg2rad); label=`tan(${n}°)`; break;
    case 'sqrt': result=n<0?'Ошибка':Math.sqrt(n); label=`√${n}`; break;
    case 'pow2': result=n**2; label=`${n}²`; break;
    case 'pow3': result=n**3; label=`${n}³`; break;
    case 'inv': result=n===0?'Ошибка':1/n; label=`1/${n}`; break;
    case 'log': result=n<=0?'Ошибка':Math.log10(n); label=`log(${n})`; break;
    case 'ln': result=n<=0?'Ошибка':Math.log(n); label=`ln(${n})`; break;
    case 'pi': current=Math.PI.toString(); justEvaled=true; updateDisplay('anim-result'); return;
    case 'e': current=Math.E.toString(); justEvaled=true; updateDisplay('anim-result'); return;
    case 'fact':
      if(n<0||n>170||!Number.isInteger(n)){result='Ошибка';}
      else{let f=1;for(let i=2;i<=n;i++)f*=i;result=f;}
      label=`${n}!`; break;
  }
  const res=fmt(result);
  if(res!=='Ошибка') addHistory(label,res);
  exprEl.textContent=label+' =';
  current=res; justEvaled=true;
  updateDisplay('anim-result');
}

document.querySelector('.btns').addEventListener('click',e=>{
  const btn=e.target.closest('[data-action]');
  if(!btn)return;
  ripple(btn,e);
  const action=btn.dataset.action, val=btn.dataset.val;

  if(action==='digit'){
    if(justEvaled){current=val;justEvaled=false;}
    else current=current==='0'?val:current+val;
    updateDisplay('anim-num');
  }
  else if(action==='dot'){
    if(justEvaled){current='0.';justEvaled=false;}
    else if(!current.includes('.'))current+='.';
    updateDisplay('anim-num');
  }
  else if(action==='clear'){
    current='0';prev='';operator='';justEvaled=false;
    exprEl.textContent='';highlightOp(null);
    updateDisplay('anim-num');
  }
  else if(action==='sign'){
    if(current!=='0'&&current!=='Ошибка')
      current=current.startsWith('-')?current.slice(1):'-'+current;
    updateDisplay('anim-num');
  }
  else if(action==='percent'){
    if(current!=='Ошибка') current=fmt(parseFloat(current)/100);
    updateDisplay('anim-num');
  }
  else if(action==='op'){
    if(current==='Ошибка')return;
    if(operator&&!justEvaled){
      const res=applyOp(prev,current,operator);
      current=fmt(res); updateDisplay();
    }
    prev=current; operator=val; justEvaled=false;
    exprEl.textContent=prev+' '+val;
    highlightOp(val); current='0';
  }
  else if(action==='eq'){
    if(!operator||current==='Ошибка')return;
    const expr=prev+' '+operator+' '+current;
    const res=applyOp(prev,current,operator);
    current=fmt(res);
    exprEl.textContent=expr+' =';
    if(current!=='Ошибка') addHistory(expr,current);
    else animate('anim-shake');
    highlightOp(null); operator=''; prev=''; justEvaled=true;
    updateDisplay('anim-result');
  }
});

// Клавиатура
document.addEventListener('keydown',e=>{
  if(e.key>='0'&&e.key<='9') document.querySelector(`[data-val="${e.key}"]`)?.click();
  else if(e.key==='+') document.querySelector('[data-val="+"]')?.click();
  else if(e.key==='-') document.querySelector('[data-val="−"]')?.click();
  else if(e.key==='*') document.querySelector('[data-val="×"]')?.click();
  else if(e.key==='/'){e.preventDefault();document.querySelector('[data-val="÷"]')?.click();}
  else if(e.key==='Enter'||e.key==='=') document.querySelector('[data-action="eq"]')?.click();
  else if(e.key==='Escape') document.querySelector('[data-action="clear"]')?.click();
  else if(e.key==='.') document.querySelector('[data-action="dot"]')?.click();
  else if(e.key==='Backspace'){
    if(current.length>1&&current!=='Ошибка') current=current.slice(0,-1);
    else current='0';
    updateDisplay('anim-num');
  }
});

renderHistory();
</script>
</body>
</html>
